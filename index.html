          predictText: '對手最可能推直線中路 (路線 1)，A 必須舉拍攔截；若挑斜線 (路線 2)，B 發動攻擊。'
        },
        '發外角短球 (拉開中路)': {
          aStart: [325, 960], aEnd: [325, 960], bStart: [325, 1250], bEnd: [400, 1200], 
          opp1Start: [325, 480], opp1End: [480, 492], opp2Start: [325, 150], opp2End: [325, 150], 
          ballStart: [325, 960], ballEnd: [480, 492], ballCurve: 40, 
          text: '強迫接發球員向外大跨步，瞬間拉開對手兩人之間的中路防守空洞。',
          newbie: { pain: '發外角球速慢，被對手從容跨步撲殺。', solve: '發外角必須帶有「平快」節奏，不能讓球飛太久。' },
          veteran: { pain: '拉開對手後，我方後排沒意識到空檔。', solve: '發外角前先打暗號，讓後排隊友提前準備突擊中路。' },
          predictionLines: [{ end: [480, 800], color: '#06b6d4', label: '推直線邊線' }, { end: [325, 1200], color: '#ec4899', label: '勾中路/對角' }],
          predictText: '對手重心不穩，可能推直線 (路線 1) 由 A 封堵；或勾回中路 (路線 2)，B 直接突擊空檔！'
        },
        '偷發後場 (破壞重心)': {
          aStart: [325, 960], aEnd: [325, 1050], bStart: [325, 1250], bEnd: [325, 1250], 
          opp1Start: [325, 480], opp1End: [325, 150], opp2Start: [470, 300], opp2End: [470, 300], 
          ballStart: [325, 960], ballEnd: [325, 150], ballCurve: 100, 
          text: '發現對手接發站位太前且重心往前壓，突然偷發高遠球至後場，強迫對手急速後仰。',
          newbie: { pain: '偷發後場被對手輕鬆識破重殺。', solve: '發球動作必須與發短球完全一致，利用手腕瞬間發力。' },
          veteran: { pain: '發完球傻站網前，被對手回抽追身。', solve: '偷發後場後，A 必須稍微後退半步，準備攔截對手過渡球。' },
          predictionLines: [{ end: [325, 850], color: '#06b6d4', label: '軟擋中路' }, { end: [180, 1100], color: '#ec4899', label: '勉強殺球' }],
          predictText: '對手急速後仰，只能勉強軟擋 (路線 1) 或無力殺球 (路線 2)，我方已做好防反準備。'
        },
        '接發推撲上網 (強勢搶攻)': {
          aStart: [280, 480], aEnd: [325, 400], bStart: [325, 1250], bEnd: [470, 1100], 
          opp1Start: [325, 960], opp1End: [325, 960], opp2Start: [325, 1250], opp2End: [325, 1250], 
          ballStart: [325, 960], ballEnd: [280, 492], ballCurve: 30, 
          text: '【接發搶攻】A 抓準對手發球偏高，直接推壓對手兩腰並「瞬間上網」，強迫進入進攻輪轉！',
          newbie: { pain: '接發球總是習慣把球挑高。', solve: '接發球拍子必須高舉過白帶，有機會就往下壓，絕不起高球。' },
          veteran: { pain: '推撲完沒有連貫動作，被對手輕易回擋。', solve: '推球後利用身體慣性直接貼網，讓 B 負責後場抓對手平抽。' },
          predictionLines: [{ end: [325, 800], color: '#06b6d4', label: '被迫擋網' }, { end: [470, 1250], color: '#ec4899', label: '被迫挑高' }],
          predictText: 'A 的推撲造成對手極大壓力，若勉強擋網 (路線 1) A 直接撲死；若挑高 (路線 2) 則交給 B。'
        }
      };

      const handleModeChange = (mode) => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setAnimEnabled(false); setCurrentMode(mode);
        setIsPlaying(false); setIsAnimFinished(false);
        const firstCategory = Object.keys(menus[mode])[0];
        setScenario(menus[mode][firstCategory][0]);
        setTimeout(() => { setAnimEnabled(true); }, 50);
      };

      const handlePlayReplay = useCallback(() => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setAnimEnabled(false); setIsPlaying(false); setIsAnimFinished(false);
        setTimeout(() => {
          setAnimEnabled(true); setIsPlaying(true);
          timerRef.current = setTimeout(() => { setIsAnimFinished(true); }, 1600);
        }, 50);
      }, []);

      const handleReset = useCallback(() => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setAnimEnabled(false); setIsPlaying(false); setIsAnimFinished(false);
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.code === 'Space') { e.preventDefault(); handlePlayReplay(); } 
          else if (e.key === 'r' || e.key === 'R') { handleReset(); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [handlePlayReplay, handleReset]);

      const handleScenarioChange = (e) => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setAnimEnabled(false); setScenario(e.target.value);
        setIsPlaying(false); setIsAnimFinished(false);
        setTimeout(() => { setAnimEnabled(true); }, 50);
      };

      const currentData = scenarioData[scenario] || scenarioData['被動挑高球 (防守轉變)'];

      const getLeftyAdvice = () => {
        if (currentMode === 'mixed') return '若女隊員為左手，網前正反手封鎖面將相反，男隊員需適應新防區。';
        if (scenario.includes('挑高球') || scenario.includes('平移') || scenario.includes('平抽') || scenario.includes('兩腰突擊')) {
          return '防守與相持時，兩人中間的正反手防區相反！特別注意中路球防撞默契。';
        }
        return '進攻時 A 的正手火力覆蓋範圍改變，對角線突擊能力將成為破壞對手節奏的隱藏利器！';
      };

      const renderPredictionLine = (start, line, idx) => {
        const dx = line.end[0] - start[0]; const dy = line.end[1] - start[1];
        const midX = start[0] + dx * 0.7; const midY = start[1] + dy * 0.7;
        return (
          <g key={`pred-${idx}`} className="animate-fade-in">
            <line x1={start[0]} y1={start[1]} x2={line.end[0]} y2={line.end[1]} stroke={line.color} strokeWidth="6" strokeDasharray="15 10" opacity="0.9" strokeLinecap="round" markerEnd={`url(#arrowPred${idx})`} />
            <circle cx={midX} cy={midY} r="18" fill={line.color} stroke="#fff" strokeWidth="2" opacity="1" />
            <text x={midX} y={midY} fontSize="18" fill="#ffffff" textAnchor="middle" dominantBaseline="central" fontWeight="bold">{idx+1}</text>
          </g>
        );
      };

      const renderBallPath = () => {
        const startX = currentData.ballStart[0]; const startY = currentData.ballStart[1];
        const endX = isPlaying ? currentData.ballEnd[0] : startX;
        const endY = isPlaying ? currentData.ballEnd[1] : startY;
        const curve = currentData.ballCurve || 0;

        if (scenario === '接發推撲上網 (強勢搶攻)') {
          const oppStartX = 325; const oppStartY = 960;
          const oppEndX = 280; const oppEndY = 492;
          const pushEndX = isPlaying ? 470 : oppEndX;
          const pushEndY = isPlaying ? 1100 : oppEndY;
          return (
            <g>
              <line className="anim-ball" x1={oppStartX} y1={oppStartY} x2={oppEndX} y2={oppEndY} stroke="#facc15" strokeWidth="4" strokeDasharray="8" opacity={isPlaying ? 0 : 1} />
              <line className="anim-ball" x1={oppEndX} y1={oppEndY} x2={pushEndX} y2={pushEndY} stroke="#facc15" strokeWidth="4" strokeDasharray="8" opacity={isPlaying ? 1 : 0} style={{transitionDelay: '0.2s'}} />
            </g>
          );
        }

        if (curve === 0) {
          return <line className="anim-ball" x1={startX} y1={startY} x2={endX} y2={endY} stroke="#facc15" strokeWidth="4" strokeDasharray="8" />;
        } else {
          const midX = (startX + endX) / 2; const midY = (startY + endY) / 2;
          const dx = endX - startX; const dy = endY - startY;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          const cx = midX + (-dy / dist) * curve; const cy = midY + (dx / dist) * curve;
          return <path className="anim-ball" d={`M ${startX} ${startY} Q ${cx} ${cy} ${endX} ${endY}`} fill="none" stroke="#facc15" strokeWidth="4" strokeDasharray="8" style={{transition: 'd 0.5s ease-out'}} />;
        }
      };

      const renderPlayer = (start, end, color, label, isOpponent) => {
        const x = isPlaying ? end[0] : start[0];
        const y = isPlaying ? end[1] : start[1];
        const isLefty = (label === 'A' && isALefty);
        let racketXOffset = isOpponent ? -18 : 18;
        if (isLefty) racketXOffset = -18; 
        return (
          <g>
            <circle cx={start[0]} cy={start[1]} r="22" fill="none" stroke={color} strokeWidth="3" strokeDasharray="6" opacity={isPlaying ? 1 : 0} style={{ transition: 'opacity 0.6s 1.0s' }} />
            <line x1={start[0]} y1={start[1]} x2={end[0]} y2={end[1]} stroke={color} strokeWidth="3" strokeDasharray="6" opacity={isPlaying ? 1 : 0} style={{ transition: 'opacity 0.6s 1.0s' }} />
            <g className="anim-player-group" style={{ transform: `translate(${x}px, ${y}px)` }}>
              <circle cx="0" cy="0" r="25" fill={color} stroke="#ffffff" strokeWidth="3" className="shadow-[3px_3px_0px_0px_rgba(0,0,0,0.5)]" />
              <text x="0" y="0" fontSize="22" fill="#ffffff" textAnchor="middle" dominantBaseline="central" fontWeight="bold">{label}</text>
              <circle cx={racketXOffset} cy={isOpponent ? 8 : -8} r="7" fill="#ffffff" />
            </g>
          </g>
        );
      };

      return (
        <React.Fragment>
          {/* V15.2 核心修復：在電腦版加上 lg:h-screen lg:overflow-hidden 鎖定螢幕總高度 */}
          <div className={`flex flex-col lg:flex-row w-full min-h-screen lg:h-screen lg:overflow-hidden p-3 lg:p-6 gap-5 lg:gap-6 box-border font-sans pb-24 lg:pb-6 ${animEnabled ? 'anim-enabled' : 'no-anim'}`}>
            
            {/* ================= 左側面板 ================= */}
            {!isFullscreen && (
            <div className="w-full lg:w-[360px] flex flex-col gap-5 shrink-0 lg:h-full lg:overflow-hidden">
              <div className="pro-card flex flex-col relative overflow-hidden shrink-0">
                <div className="absolute top-0 right-0 bg-[#0f172a] text-[#fbbf24] font-black px-3 py-1 text-xs rounded-bl-xl z-10">PRO V15.2</div>
                <h1 className="text-xl font-black mb-0 pb-3 border-b-[3px] border-[#0f172a] text-center bg-[#fbbf24] p-4 tracking-wide">🏸 雙打戰術指揮中心</h1>
                
                <div className="flex w-full border-b-[3px] border-[#0f172a]">
                  <button onClick={() => handleModeChange('regular')} className={`flex-1 py-3 font-black text-sm border-r-[3px] border-[#0f172a] transition-colors ${currentMode === 'regular' ? 'pro-tab-active' : 'pro-tab-inactive'}`}>🏸 常規</button>
                  <button onClick={() => handleModeChange('mixed')} className={`flex-1 py-3 font-black text-sm border-r-[3px] border-[#0f172a] transition-colors ${currentMode === 'mixed' ? 'pro-tab-active' : 'pro-tab-inactive'}`}>👫 混雙</button>
                  <button onClick={() => handleModeChange('serve')} className={`flex-1 py-3 font-black text-sm transition-colors ${currentMode === 'serve' ? 'pro-tab-active' : 'pro-tab-inactive'}`}>🎯 發球</button>
                </div>

                <div className="p-5">
                  <label className="block text-sm font-black text-slate-800 mb-2">演練情境</label>
                  <select className="w-full p-3 border-[3px] border-[#0f172a] bg-white font-bold text-sm focus:outline-none focus:ring-4 focus:ring-[#fbbf24] rounded-lg cursor-pointer transition-shadow shadow-[3px_3px_0px_0px_#0f172a]" value={scenario} onChange={handleScenarioChange}>
                    {Object.entries(menus[currentMode]).map(([category, scenarios]) => (
                      <optgroup key={category} label={category} className="font-black text-slate-500 bg-slate-100">
                        {scenarios.map(scen => <option key={scen} value={scen} className="font-bold text-[#0f172a] bg-white">{scen}</option>)}
                      </optgroup>
                    ))}
                  </select>

                  <div className="mt-5 flex items-center justify-between p-3 bg-slate-100 border-[3px] border-[#0f172a] rounded-lg shadow-[3px_3px_0px_0px_#0f172a]">
                    <span className="font-black text-[#0f172a] text-sm">✋ 左手持拍動態提醒</span>
                    <label className="relative inline-flex items-center cursor-pointer">
                      <input type="checkbox" className="sr-only peer" checked={isALefty} onChange={() => setIsALefty(!isALefty)} />
                      <div className="w-12 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600 border-2 border-[#0f172a]"></div>
                    </label>
                  </div>
                </div>
              </div>

              <div className="pro-card p-5 lg:flex-1 lg:overflow-y-auto no-scrollbar flex flex-col gap-5">
                <div>
                  <h2 className="text-lg font-black text-[#0f172a] mb-2 pb-2 border-b-[3px] border-dashed border-slate-300">📖 跑位解析</h2>
                  
                  {isALefty && (
                    <div className="mb-3 p-3 bg-indigo-50 border-2 border-indigo-600 text-sm font-bold text-indigo-900 rounded-lg flex items-start gap-2 shadow-[2px_2px_0px_0px_#4f46e5] animate-fade-in">
                      <span className="text-xl leading-none">⚡</span>
                      <span>{getLeftyAdvice()}</span>
                    </div>
                  )}
                  <p className="text-[15px] font-bold text-slate-700 leading-relaxed">{currentData.text}</p>
                </div>

                <div className="bg-[#fef3c7] border-[3px] border-[#0f172a] p-4 rounded-xl shadow-[3px_3px_0px_0px_#0f172a] hidden lg:block mt-auto">
                  <h3 className="text-[15px] font-black text-[#0f172a] mb-3 pb-2 border-b-[3px] border-[#0f172a] flex items-center">
                    <span className="text-xl mr-2">💡</span> 雙打三大鐵律
                  </h3>
                  <ul className="text-sm font-bold text-slate-800 leading-relaxed space-y-2">
                    <li className="flex items-start"><span className="text-red-600 mr-2 font-black">1.</span><span><span className="text-indigo-700 font-black">挑球退防：</span>誰挑球誰退直線</span></li>
                    <li className="flex items-start"><span className="text-red-600 mr-2 font-black">2.</span><span><span className="text-indigo-700 font-black">前排封網：</span>雨刷式橫移</span></li>
                    <li className="flex items-start"><span className="text-red-600 mr-2 font-black">3.</span><span><span className="text-indigo-700 font-black">中路搶球：</span>防守看正手/進攻看高度</span></li>
                  </ul>
                </div>
              </div>
            </div>
            )}

            {/* ================= 中央球場區 ================= */}
            <div className={`w-full lg:flex-1 bg-[#15803d] border-[6px] border-[#0f172a] rounded-2xl relative flex justify-center items-center shadow-[inset_0px_0px_30px_rgba(0,0,0,0.5)] lg:h-full overflow-hidden ${isFullscreen ? 'min-h-[85vh]' : 'min-h-[60vh]'}`}>
              
              <div className="hidden lg:block absolute top-4 left-1/2 -translate-x-1/2 z-30">
                 <button onClick={() => setIsFullscreen(!isFullscreen)} className="px-5 py-2 bg-[#0f172a] text-[#fbbf24] font-black text-sm border-2 border-[#fbbf24] rounded-lg hover:bg-slate-800 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] transition-transform active:translate-y-1 active:shadow-none">
                   {isFullscreen ? '退出全螢幕 🗗' : '進入教學模式 ⛶'}
                 </button>
              </div>

              <div className="hidden lg:flex absolute right-6 top-1/2 -translate-y-1/2 w-28 bg-white border-[3px] border-[#0f172a] p-2 rounded-xl shadow-[4px_4px_0px_0px_#0f172a] z-20 flex-col gap-3 opacity-95 hover:opacity-100 transition-opacity">
                <div className="text-center pb-2 border-b-[3px] border-dashed border-slate-300 flex flex-col items-center">
                   <span className={`inline-block w-4 h-4 rounded-full mb-1 border-2 border-[#0f172a] ${isPlaying ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></span>
                   <span className="font-black text-xs text-slate-700">{isPlaying ? '推演中' : '待命'}</span>
                </div>
                <button onClick={handlePlayReplay} className="w-full py-3 bg-[#fbbf24] text-[#0f172a] text-sm font-black border-[3px] border-[#0f172a] rounded-lg hover:bg-yellow-300 active:translate-y-1 active:shadow-none transition-all shadow-[2px_2px_0px_0px_#0f172a]">
                  ▶ 播放
                </button>
                <button onClick={handleReset} className="w-full py-2 bg-slate-200 text-[#0f172a] text-sm font-bold border-[3px] border-[#0f172a] rounded-lg hover:bg-slate-300 active:translate-y-1 active:shadow-none transition-all shadow-[2px_2px_0px_0px_#0f172a]">
                  ↺ 重置
                </button>
              </div>

              {/* V15.2 核心修復：強制將 SVG 高度限制為父容器的 100% (h-full)，並且讓寬度自動縮放 (w-auto max-w-full) */}
              <svg viewBox="0 0 650 1380" preserveAspectRatio="xMidYMid meet" className="h-[70vh] lg:h-full w-auto max-w-full py-4 lg:py-8 drop-shadow-2xl" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <marker id="arrowPred0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={currentData.predictionLines[0].color} /></marker>
                  <marker id="arrowPred1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={currentData.predictionLines[1].color} /></marker>
                </defs>
                <rect x="20" y="20" width="610" height="1340" fill="none" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="20" y1="94" x2="630" y2="94" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="1286" x2="630" y2="1286" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="492" x2="630" y2="492" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="888" x2="630" y2="888" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="66" y1="20" x2="66" y2="1360" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="584" y1="20" x2="584" y2="1360" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="325" y1="20" x2="325" y2="492" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="325" y1="888" x2="325" y2="1360" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="0" y1="690" x2="650" y2="690" stroke="#ffffff" strokeWidth="10" opacity="0.9" strokeLinecap="round" />
                <line x1="0" y1="690" x2="650" y2="690" stroke="#0f172a" strokeWidth="4" strokeDasharray="8" opacity="0.5" />

                {isAnimFinished && enablePrediction && currentData.predictionLines.map((line, idx) => renderPredictionLine(currentData.ballEnd, line, idx))}
                {renderBallPath()}
                
                {scenario !== '接發推撲上網 (強勢搶攻)' && <circle className="anim-ball" cx={isPlaying ? currentData.ballEnd[0] : currentData.ballStart[0]} cy={isPlaying ? currentData.ballEnd[1] : currentData.ballStart[1]} r="12" fill="#ffffff" stroke="#0f172a" strokeWidth="3" opacity={isPlaying ? 1 : 0} />}

                {renderPlayer(currentData.opp1Start, currentData.opp1End, '#94a3b8', 'C', true)}
                {renderPlayer(currentData.opp2Start, currentData.opp2End, '#64748b', 'D', true)}
                {renderPlayer(currentData.aStart, currentData.aEnd, '#3b82f6', 'A', false)}
                {renderPlayer(currentData.bStart, currentData.bEnd, '#ef4444', 'B', false)}
              </svg>
            </div>

            {/* ================= 右側面板 ================= */}
            {!isFullscreen && (
            <div className="w-full lg:w-[340px] flex flex-col gap-5 shrink-0 lg:h-full lg:overflow-hidden pb-6 lg:pb-0">
              
              <div className={`pro-card transition-colors duration-300 flex flex-col lg:min-h-[150px] shrink-0 overflow-hidden ${enablePrediction ? 'bg-[#1e1b4b] border-[#1e1b4b]' : 'bg-slate-200 border-slate-300'}`}>
                <div className="flex justify-between items-center mb-0 pb-3 border-b-[3px] border-indigo-400 p-4">
                  <span className={`font-black text-lg ${enablePrediction ? 'text-white' : 'text-slate-500'}`}>🔮 下一拍預測</span>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={enablePrediction} onChange={() => setEnablePrediction(!enablePrediction)} />
                    <div className="w-12 h-6 bg-slate-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-400 border-2 border-[#0f172a]"></div>
                  </label>
                </div>
                <div className="p-4 lg:flex-1 lg:overflow-y-auto no-scrollbar flex flex-col justify-center">
                  {enablePrediction ? (
                    isAnimFinished ? (
                      <div className="animate-fade-in flex flex-col gap-2">
                         <div className="flex items-center gap-2 bg-indigo-900/50 p-2 rounded-lg">
                            <span className="w-6 h-6 rounded-full bg-[#06b6d4] text-white font-bold text-xs border-2 border-white flex items-center justify-center shadow-sm">1</span>
                            <span className="text-[#06b6d4] font-black text-sm">{currentData.predictionLines[0].label}</span>
                            <span className="mx-1 text-indigo-400 font-black">|</span>
                            <span className="w-6 h-6 rounded-full bg-[#ec4899] text-white font-bold text-xs border-2 border-white flex items-center justify-center shadow-sm">2</span>
                            <span className="text-[#ec4899] font-black text-sm">{currentData.predictionLines[1].label}</span>
                         </div>
                         <p className="text-indigo-100 text-[15px] font-bold leading-relaxed mt-1">{currentData.predictText}</p>
                      </div>
                    ) : <div className="text-center text-indigo-300 font-bold text-sm animate-pulse py-4">動畫完畢後顯示情報...</div>
                  ) : <div className="text-center text-slate-500 font-bold text-sm py-4">雷達已關閉</div>}
                </div>
              </div>

              <div className="pro-card p-4 lg:p-5 lg:flex-1 flex flex-col lg:overflow-y-auto no-scrollbar">
                <h2 className="text-lg font-black text-[#0f172a] mb-4 pb-2 border-b-[3px] border-dashed border-slate-300">🧠 實戰細節覆盤</h2>
                <div className="flex flex-col gap-4 pb-2">
                  <button onClick={() => setShowNewbie(!showNewbie)} className={`w-full py-3 font-black border-[3px] border-[#0f172a] rounded-xl transition-all active:translate-y-1 active:shadow-none ${showNewbie ? 'bg-blue-300 text-[#0f172a] shadow-[3px_3px_0px_0px_#0f172a]' : 'bg-slate-100 text-slate-600 shadow-sm hover:bg-slate-200'}`}>
                    {showNewbie ? '▼ 新手痛點解方' : '▶ 新手痛點解方'}
                  </button>
                  {showNewbie && (
                    <div className="bg-blue-50 border-l-[6px] border-blue-500 p-4 rounded-r-xl shadow-sm animate-fade-in flex flex-col gap-2">
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-red-600 font-black text-base">⚠️ 痛點：</span>{currentData.newbie.pain}</div>
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-green-600 font-black text-base">💡 克服：</span>{currentData.newbie.solve}</div>
                    </div>
                  )}

                  <button onClick={() => setShowVeteran(!showVeteran)} className={`w-full py-3 font-black border-[3px] border-[#0f172a] rounded-xl transition-all active:translate-y-1 active:shadow-none ${showVeteran ? 'bg-orange-300 text-[#0f172a] shadow-[3px_3px_0px_0px_#0f172a]' : 'bg-slate-100 text-slate-600 shadow-sm hover:bg-slate-200'}`}>
                    {showVeteran ? '▼ 老手進階細節' : '▶ 老手進階細節'}
                  </button>
                  {showVeteran && (
                    <div className="bg-orange-50 border-l-[6px] border-orange-500 p-4 rounded-r-xl shadow-sm animate-fade-in flex flex-col gap-2">
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-red-600 font-black text-base">⚠️ 痛點：</span>{currentData.veteran.pain}</div>
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-green-600 font-black text-base">💡 克服：</span>{currentData.veteran.solve}</div>
                    </div>
                  )}
                </div>
              </div>
              
            </div>
            )}
          </div>

          {/* V15.1：專屬手機版的懸浮控制底盤 (Bottom Bar) */}
          {!isFullscreen && (
          <div className="lg:hidden fixed bottom-0 left-0 right-0 w-full bg-white border-t-[4px] border-[#0f172a] p-3 z-50 flex gap-3 shadow-[0px_-5px_15px_rgba(0,0,0,0.1)]">
              <button onClick={handlePlayReplay} className="flex-1 py-3 bg-[#fbbf24] text-[#0f172a] text-lg font-black border-[3px] border-[#0f172a] rounded-xl shadow-[3px_3px_0px_0px_#0f172a] active:translate-y-1 active:shadow-none transition-all">
                ▶ 播放 / 重播
              </button>
              <button onClick={handleReset} className="w-20 py-3 bg-slate-200 text-[#0f172a] text-xl font-black border-[3px] border-[#0f172a] rounded-xl shadow-[3px_3px_0px_0px_#0f172a] active:translate-y-1 active:shadow-none transition-all">
                ↺
              </button>
          </div>
          )}
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BadmintonTacticsSimulator />);
  </script>
</body>
</html>
