                  <ul className="text-sm font-bold text-slate-800 leading-relaxed space-y-2">
                    <li className="flex items-start"><span className="text-red-600 mr-2 font-black">1.</span><span><span className="text-indigo-700 font-black">挑球退防：</span>誰挑球誰退直線</span></li>
                    <li className="flex items-start"><span className="text-red-600 mr-2 font-black">2.</span><span><span className="text-indigo-700 font-black">前排封網：</span>雨刷式橫移</span></li>
                    <li className="flex items-start"><span className="text-red-600 mr-2 font-black">3.</span><span><span className="text-indigo-700 font-black">中路搶球：</span>防守看正手/進攻看高度</span></li>
                  </ul>
                </div>
              </div>
            </div>
            )}

            {/* ================= 中央球場區 ================= */}
            <div className={`w-full lg:flex-1 bg-[#15803d] border-[6px] border-[#0f172a] rounded-2xl relative flex justify-center items-center shadow-[inset_0px_0px_30px_rgba(0,0,0,0.5)] lg:h-full overflow-hidden ${isFullscreen ? 'min-h-[85vh]' : 'min-h-[60vh]'}`}>
              
              <div className="hidden lg:block absolute top-4 left-4 z-30">
                 <button onClick={() => setIsFullscreen(!isFullscreen)} className="px-5 py-2 bg-[#0f172a] text-[#fbbf24] font-black text-sm border-2 border-[#fbbf24] rounded-lg hover:bg-slate-800 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] transition-transform active:translate-y-1 active:shadow-none">
                   {isFullscreen ? '退出全螢幕 🗗' : '進入教學模式 ⛶'}
                 </button>
              </div>

              {/* V16 新增防守區顯示開關 */}
              <div className="absolute top-4 right-4 z-30 bg-white border-[3px] border-[#0f172a] rounded-lg px-3 py-2 flex items-center shadow-[3px_3px_0px_0px_#0f172a]">
                <span className="font-black text-[#0f172a] text-sm mr-3">🛡️ 顯示防守責任區</span>
                <label className="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" className="sr-only peer" checked={showCoverage} onChange={() => setShowCoverage(!showCoverage)} />
                  <div className="w-10 h-5 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600 border-2 border-[#0f172a]"></div>
                </label>
              </div>

              <div className="hidden lg:flex absolute right-6 top-1/2 -translate-y-1/2 w-28 bg-white border-[3px] border-[#0f172a] p-2 rounded-xl shadow-[4px_4px_0px_0px_#0f172a] z-20 flex-col gap-3 opacity-95 hover:opacity-100 transition-opacity">
                <div className="text-center pb-2 border-b-[3px] border-dashed border-slate-300 flex flex-col items-center">
                   <span className={`inline-block w-4 h-4 rounded-full mb-1 border-2 border-[#0f172a] ${isPlaying ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></span>
                   <span className="font-black text-xs text-slate-700">{isPlaying ? '推演中' : '待命'}</span>
                </div>
                <button onClick={handlePlayReplay} className="w-full py-3 bg-[#fbbf24] text-[#0f172a] text-sm font-black border-[3px] border-[#0f172a] rounded-lg hover:bg-yellow-300 active:translate-y-1 active:shadow-none transition-all shadow-[2px_2px_0px_0px_#0f172a]">
                  ▶ 播放
                </button>
                <button onClick={handleReset} className="w-full py-2 bg-slate-200 text-[#0f172a] text-sm font-bold border-[3px] border-[#0f172a] rounded-lg hover:bg-slate-300 active:translate-y-1 active:shadow-none transition-all shadow-[2px_2px_0px_0px_#0f172a]">
                  ↺ 重置
                </button>
              </div>

              <svg viewBox="0 0 650 1380" preserveAspectRatio="xMidYMid meet" className="h-[70vh] lg:h-full w-auto max-w-full py-4 lg:py-8 drop-shadow-2xl" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <marker id="arrowPred0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={currentData.predictionLines[0].color} /></marker>
                  <marker id="arrowPred1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={currentData.predictionLines[1].color} /></marker>
                </defs>
                <rect x="20" y="20" width="610" height="1340" fill="none" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="20" y1="94" x2="630" y2="94" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="1286" x2="630" y2="1286" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="492" x2="630" y2="492" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="888" x2="630" y2="888" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="66" y1="20" x2="66" y2="1360" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="584" y1="20" x2="584" y2="1360" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="325" y1="20" x2="325" y2="492" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="325" y1="888" x2="325" y2="1360" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="0" y1="690" x2="650" y2="690" stroke="#ffffff" strokeWidth="10" opacity="0.9" strokeLinecap="round" />
                <line x1="0" y1="690" x2="650" y2="690" stroke="#0f172a" strokeWidth="4" strokeDasharray="8" opacity="0.5" />

                {/* V16 繪製防守責任區塊 */}
                {currentData.coverage && (
                  <g className="coverage-area" opacity={showCoverage ? (isPlaying || !animEnabled ? 1 : 0) : 0}>
                    <path d={currentData.coverage.a} fill="#3b82f6" opacity="0.2" />
                    <path d={currentData.coverage.b} fill="#ef4444" opacity="0.2" />
                    <text x="70" y="1350" fill="#3b82f6" fontSize="16" fontWeight="bold" opacity="0.7">A 責任區</text>
                    <text x="540" y="1350" fill="#ef4444" fontSize="16" fontWeight="bold" opacity="0.7">B 責任區</text>
                  </g>
                )}

                {isAnimFinished && enablePrediction && currentData.predictionLines.map((line, idx) => renderPredictionLine(currentData.ballEnd, line, idx))}
                {renderBallPath()}
                
                {scenario !== '接發推撲上網 (強勢搶攻)' && <circle className="anim-ball" cx={isPlaying ? currentData.ballEnd[0] : currentData.ballStart[0]} cy={isPlaying ? currentData.ballEnd[1] : currentData.ballStart[1]} r="12" fill="#ffffff" stroke="#0f172a" strokeWidth="3" opacity={isPlaying ? 1 : 0} />}

                {renderPlayer(currentData.opp1Start, currentData.opp1End, '#94a3b8', 'C', true)}
                {renderPlayer(currentData.opp2Start, currentData.opp2End, '#64748b', 'D', true)}
                {renderPlayer(currentData.aStart, currentData.aEnd, '#3b82f6', 'A', false)}
                {renderPlayer(currentData.bStart, currentData.bEnd, '#ef4444', 'B', false)}
              </svg>
            </div>

            {/* ================= 右側面板 ================= */}
            {!isFullscreen && (
            <div className="w-full lg:w-[340px] flex flex-col gap-5 shrink-0 lg:h-full lg:overflow-hidden pb-6 lg:pb-0">
              
              <div className={`pro-card transition-colors duration-300 flex flex-col lg:min-h-[150px] shrink-0 overflow-hidden ${enablePrediction ? 'bg-[#1e1b4b] border-[#1e1b4b]' : 'bg-slate-200 border-slate-300'}`}>
                <div className="flex justify-between items-center mb-0 pb-3 border-b-[3px] border-indigo-400 p-4">
                  <span className={`font-black text-lg ${enablePrediction ? 'text-white' : 'text-slate-500'}`}>🔮 下一拍預測</span>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={enablePrediction} onChange={() => setEnablePrediction(!enablePrediction)} />
                    <div className="w-12 h-6 bg-slate-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-400 border-2 border-[#0f172a]"></div>
                  </label>
                </div>
                <div className="p-4 lg:flex-1 lg:overflow-y-auto no-scrollbar flex flex-col justify-center">
                  {enablePrediction ? (
                    isAnimFinished ? (
                      <div className="animate-fade-in flex flex-col gap-2">
                         <div className="flex items-center gap-2 bg-indigo-900/50 p-2 rounded-lg">
                            <span className="w-6 h-6 rounded-full bg-[#06b6d4] text-white font-bold text-xs border-2 border-white flex items-center justify-center shadow-sm">1</span>
                            <span className="text-[#06b6d4] font-black text-sm">{currentData.predictionLines[0].label}</span>
                            <span className="mx-1 text-indigo-400 font-black">|</span>
                            <span className="w-6 h-6 rounded-full bg-[#ec4899] text-white font-bold text-xs border-2 border-white flex items-center justify-center shadow-sm">2</span>
                            <span className="text-[#ec4899] font-black text-sm">{currentData.predictionLines[1].label}</span>
                         </div>
                         <p className="text-indigo-100 text-[15px] font-bold leading-relaxed mt-1">{currentData.predictText}</p>
                      </div>
                    ) : <div className="text-center text-indigo-300 font-bold text-sm animate-pulse py-4">動畫完畢後顯示情報...</div>
                  ) : <div className="text-center text-slate-500 font-bold text-sm py-4">雷達已關閉</div>}
                </div>
              </div>

              <div className="pro-card p-4 lg:p-5 lg:flex-1 flex flex-col lg:overflow-y-auto no-scrollbar">
                <h2 className="text-lg font-black text-[#0f172a] mb-4 pb-2 border-b-[3px] border-dashed border-slate-300">🧠 實戰痛點覆盤</h2>
                <div className="flex flex-col gap-4 pb-2">
                  <button onClick={() => setShowNewbie(!showNewbie)} className={`w-full py-3 font-black border-[3px] border-[#0f172a] rounded-xl transition-all active:translate-y-1 active:shadow-none ${showNewbie ? 'bg-blue-300 text-[#0f172a] shadow-[3px_3px_0px_0px_#0f172a]' : 'bg-slate-100 text-slate-600 shadow-sm hover:bg-slate-200'}`}>
                    {showNewbie ? '▼ 新手痛點解方' : '▶ 新手痛點解方'}
                  </button>
                  {showNewbie && (
                    <div className="bg-blue-50 border-l-[6px] border-blue-500 p-4 rounded-r-xl shadow-sm animate-fade-in flex flex-col gap-2">
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-red-600 font-black text-base">⚠️ 痛點：</span>{currentData.newbie.pain}</div>
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-green-600 font-black text-base">💡 克服：</span>{currentData.newbie.solve}</div>
                    </div>
                  )}

                  <button onClick={() => setShowVeteran(!showVeteran)} className={`w-full py-3 font-black border-[3px] border-[#0f172a] rounded-xl transition-all active:translate-y-1 active:shadow-none ${showVeteran ? 'bg-orange-300 text-[#0f172a] shadow-[3px_3px_0px_0px_#0f172a]' : 'bg-slate-100 text-slate-600 shadow-sm hover:bg-slate-200'}`}>
                    {showVeteran ? '▼ 老手進階細節' : '▶ 老手進階細節'}
                  </button>
                  {showVeteran && (
                    <div className="bg-orange-50 border-l-[6px] border-orange-500 p-4 rounded-r-xl shadow-sm animate-fade-in flex flex-col gap-2">
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-red-600 font-black text-base">⚠️ 痛點：</span>{currentData.veteran.pain}</div>
                      <div className="text-slate-800 text-sm leading-relaxed"><span className="text-green-600 font-black text-base">💡 克服：</span>{currentData.veteran.solve}</div>
                    </div>
                  )}
                </div>
              </div>
              
            </div>
            )}
          </div>

          {!isFullscreen && (
          <div className="lg:hidden fixed bottom-0 left-0 right-0 w-full bg-white border-t-[4px] border-[#0f172a] p-3 z-50 flex gap-3 shadow-[0px_-5px_15px_rgba(0,0,0,0.1)]">
              <button onClick={handlePlayReplay} className="flex-1 py-3 bg-[#fbbf24] text-[#0f172a] text-lg font-black border-[3px] border-[#0f172a] rounded-xl shadow-[3px_3px_0px_0px_#0f172a] active:translate-y-1 active:shadow-none transition-all">
                ▶ 播放 / 重播
              </button>
              <button onClick={handleReset} className="w-20 py-3 bg-slate-200 text-[#0f172a] text-xl font-black border-[3px] border-[#0f172a] rounded-xl shadow-[3px_3px_0px_0px_#0f172a] active:translate-y-1 active:shadow-none transition-all">
                ↺
              </button>
          </div>
          )}
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BadmintonTacticsSimulator />);
  </script>
</body>
</html>
