            </div>

            {/* ================= 中央球場區 ================= */}
            <div className="w-full lg:flex-1 bg-[#15803d] border-[8px] border-white rounded-[2rem] relative flex justify-center items-center shadow-[0_20px_50px_rgba(0,0,0,0.15)] lg:h-full overflow-hidden min-h-[55vh]">
              
              <div className="absolute top-4 right-4 z-30 bg-white/90 backdrop-blur-sm border border-white/20 rounded-xl px-3 py-1.5 flex items-center shadow-lg">
                <span className="font-black text-slate-800 text-[15px] mr-2">🛡️ 防守責任區</span>
                <label className="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" className="sr-only peer" checked={showCoverage} onChange={() => setShowCoverage(!showCoverage)} />
                  <div className="w-12 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                </label>
              </div>

              <div className="hidden lg:flex absolute right-6 top-1/2 -translate-y-1/2 w-28 bg-white/95 backdrop-blur-sm border border-white/20 p-2.5 rounded-2xl shadow-xl z-20 flex-col gap-2 opacity-90 hover:opacity-100 transition-opacity">
                <div className="text-center pb-2 border-b border-slate-200 flex flex-col items-center">
                   <span className={`inline-block w-3.5 h-3.5 rounded-full mb-1 shadow-inner ${isPlaying ? 'bg-green-500 animate-pulse' : 'bg-rose-500'}`}></span>
                   <span className="font-black text-[11px] text-slate-500">{isPlaying ? '推演中' : '待命'}</span>
                </div>
                <button onClick={handlePlayReplay} className="w-full py-2.5 bg-indigo-600 text-white text-[15px] font-black rounded-xl hover:bg-indigo-700 active:scale-95 transition-all shadow-md">
                  ▶ 播放
                </button>
                <button onClick={handleReset} className="w-full py-2 bg-slate-100 text-slate-700 text-[15px] font-bold rounded-xl hover:bg-slate-200 active:scale-95 transition-all">
                  ↺ 重置
                </button>
              </div>

              <svg viewBox="0 0 650 1420" preserveAspectRatio="xMidYMid meet" className="h-[75vh] lg:h-full w-auto max-w-full py-2 lg:py-6 drop-shadow-2xl" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <marker id="arrowPred0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={currentData.predictionLines[0].color} /></marker>
                  <marker id="arrowPred1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill={currentData.predictionLines[1].color} /></marker>
                  <clipPath id="court-boundary">
                    <rect x="20" y="690" width="610" height="670" />
                  </clipPath>
                </defs>
                
                {currentData.coverageStart && (
                  <g clipPath="url(#court-boundary)" style={{ transition: 'opacity 0.3s ease', opacity: showCoverage ? 1 : 0 }}>
                    <path className="coverage-path" d={isPlaying ? currentData.coverageEnd.a : currentData.coverageStart.a} fill="#3b82f6" opacity="0.25" />
                    <path className="coverage-path" d={isPlaying ? currentData.coverageEnd.b : currentData.coverageStart.b} fill="#ef4444" opacity="0.25" />
                  </g>
                )}

                <rect x="20" y="20" width="610" height="1340" rx="12" ry="12" fill="none" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="20" y1="94" x2="630" y2="94" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="1286" x2="630" y2="1286" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="492" x2="630" y2="492" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="20" y1="888" x2="630" y2="888" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="66" y1="20" x2="66" y2="1360" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="584" y1="20" x2="584" y2="1360" stroke="#ffffff" strokeWidth="4" opacity="0.9" />
                <line x1="325" y1="20" x2="325" y2="492" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="325" y1="888" x2="325" y2="1360" stroke="#ffffff" strokeWidth="5" opacity="0.9" />
                <line x1="0" y1="690" x2="650" y2="690" stroke="#ffffff" strokeWidth="10" opacity="0.9" strokeLinecap="round" />
                <line x1="0" y1="690" x2="650" y2="690" stroke="#000000" strokeWidth="4" strokeDasharray="8" opacity="0.2" />

                <text x="620" y="1405" fontSize="36" fill="#ffffff" opacity="0.6" textAnchor="end" fontWeight="900" style={{ letterSpacing: '2px' }}>© hangbaliu</text>

                {isAnimFinished && enablePrediction && currentData.predictionLines.map((line, idx) => renderPredictionLine(predictOrigin, line, idx))}
                {renderBall()}

                {renderPlayer(currentData.opp1Start, currentData.opp1End, '#94a3b8', 'C', true)}
                {renderPlayer(currentData.opp2Start, currentData.opp2End, '#64748b', 'D', true)}
                {renderPlayer(currentData.aStart, currentData.aEnd, '#3b82f6', 'A', false)}
                {renderPlayer(currentData.bStart, currentData.bEnd, '#ef4444', 'B', false)}
              </svg>
            </div>

            {/* ================= 右側面板 ================= */}
            <div className="w-full lg:w-[380px] flex flex-col gap-4 shrink-0 lg:h-full lg:overflow-hidden pb-6 lg:pb-0">
              
              <div className={`pro-card transition-colors duration-300 flex flex-col shrink-0 overflow-hidden ${enablePrediction ? 'bg-slate-900 border-slate-900' : 'bg-slate-100 border-slate-200'}`}>
                <div className="flex justify-between items-center pb-2 border-b border-white/10 p-4">
                  <span className={`font-black text-lg ${enablePrediction ? 'text-white' : 'text-slate-400'}`}>🔮 下一拍預測</span>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={enablePrediction} onChange={() => setEnablePrediction(!enablePrediction)} />
                    <div className="w-12 h-6 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-500"></div>
                  </label>
                </div>
                <div className="p-4 flex flex-col justify-center">
                  {enablePrediction ? (
                    isAnimFinished ? (
                      <div className="animate-fade-in flex flex-col gap-2">
                         <div className="flex items-center gap-2 bg-white/10 p-2 rounded-xl backdrop-blur-md">
                            <span className="w-6 h-6 rounded-full bg-[#06b6d4] text-white font-bold text-xs border border-white/20 flex items-center justify-center shadow-lg">1</span>
                            <span className="text-[#22d3ee] font-black text-[15px]">{currentData.predictionLines[0].label}</span>
                            <span className="mx-1 text-slate-500 font-black">|</span>
                            <span className="w-6 h-6 rounded-full bg-[#ec4899] text-white font-bold text-xs border border-white/20 flex items-center justify-center shadow-lg">2</span>
                            <span className="text-[#f472b6] font-black text-[15px]">{currentData.predictionLines[1].label}</span>
                         </div>
                         <p className="text-slate-300 text-[15px] font-bold leading-snug">{currentData.predictText}</p>
                      </div>
                    ) : <div className="text-center text-slate-500 font-bold text-sm animate-pulse py-3">等待動畫演算完畢...</div>
                  ) : <div className="text-center text-slate-400 font-bold text-sm py-3">雷達已關閉</div>}
                </div>
              </div>

              <div className="pro-card p-4 lg:flex-1 flex flex-col lg:overflow-y-auto no-scrollbar">
                <h2 className="text-lg font-black text-slate-800 mb-3 pb-2 border-b border-dashed border-slate-200">🧠 實戰痛點覆盤</h2>
                <div className="flex flex-col gap-3">
                  <button onClick={() => setShowNewbie(!showNewbie)} className={`w-full py-3 font-black border border-slate-200 rounded-xl transition-all text-base active:scale-95 ${showNewbie ? 'bg-sky-100 text-sky-900 shadow-inner' : 'bg-white text-slate-600 shadow-sm hover:bg-slate-50'}`}>
                    {showNewbie ? '▼ 新手痛點解方' : '▶ 新手痛點解方'}
                  </button>
                  {showNewbie && (
                    <div className="bg-sky-50/50 border-l-[4px] border-sky-400 p-3 rounded-r-xl animate-fade-in flex flex-col gap-1.5">
                      <div className="text-slate-700 text-[14px] leading-relaxed"><span className="text-rose-500 font-black">⚠️ 痛點：</span>{currentData.newbie.pain}</div>
                      <div className="text-slate-700 text-[14px] leading-relaxed"><span className="text-emerald-600 font-black">💡 克服：</span>{currentData.newbie.solve}</div>
                    </div>
                  )}

                  <button onClick={() => setShowVeteran(!showVeteran)} className={`w-full py-3 font-black border border-slate-200 rounded-xl transition-all text-base active:scale-95 ${showVeteran ? 'bg-orange-100 text-orange-900 shadow-inner' : 'bg-white text-slate-600 shadow-sm hover:bg-slate-50'}`}>
                    {showVeteran ? '▼ 老手進階細節' : '▶ 老手進階細節'}
                  </button>
                  {showVeteran && (
                    <div className="bg-orange-50/50 border-l-[4px] border-orange-400 p-3 rounded-r-xl animate-fade-in flex flex-col gap-1.5">
                      <div className="text-slate-700 text-[14px] leading-relaxed"><span className="text-rose-500 font-black">⚠️ 痛點：</span>{currentData.veteran.pain}</div>
                      <div className="text-slate-700 text-[14px] leading-relaxed"><span className="text-emerald-600 font-black">💡 克服：</span>{currentData.veteran.solve}</div>
                    </div>
                  )}
                </div>
              </div>
              
            </div>
          </div>

          <div className="lg:hidden fixed bottom-0 left-0 right-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 p-3 z-50 flex gap-2 shadow-[0_-10px_40px_rgba(0,0,0,0.08)]">
              <button onClick={handlePlayReplay} className="flex-1 py-3 bg-indigo-600 text-white text-lg font-black rounded-xl shadow-lg active:scale-95 transition-all">
                ▶ 播放 / 重播
              </button>
              <button onClick={handleReset} className="w-20 py-3 bg-slate-100 text-slate-600 text-xl font-black rounded-xl shadow-sm border border-slate-200 active:scale-95 transition-all">
                ↺
              </button>
          </div>
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BadmintonTacticsSimulator />);
  </script>
</body>
</html>
